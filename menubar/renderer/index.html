<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Repo Radar - Progress</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h1>Repo Radar</h1>
            <span class="version-text" id="version-text">Loading...</span>
        </div>
        <div class="status-bar">
            <span id="status-text">Ready</span>
            <span id="repo-count"></span>
            <button id="stop-sync-btn" class="btn-stop-icon" disabled title="Stop Sync">⏹</button>
        </div>
        <div class="rate-limit-bar" id="rate-limit-bar" style="display: none;">
            <span id="rate-limit-text">Rate Limits: Unknown</span>
        </div>
    </div>
    <div id="progress-container" class="progress-container">
        <div class="progress-summary">
            <div class="summary-stats">
                <div class="stat">
                    <span class="stat-value" id="repos-completed">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="repos-running">0</span>
                    <span class="stat-label">Running</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="repos-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat stat-clickable" id="errors-stat">
                    <span class="stat-value" id="repos-errors">0</span>
                    <span class="stat-label">Errors</span>
                </div>
            </div>
        </div>
        <div id="repos-list" class="repos-progress-list">
            <!-- Progress bars will be added here -->
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
