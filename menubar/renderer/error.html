<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sync Errors</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .error-header {
            background: #252526;
            padding: 16px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .error-header h1 {
            font-size: 18px;
            color: #f44336;
            margin: 0;
        }
        
        .error-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 6px 12px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .btn:hover {
            background: #1177bb;
        }
        
        .btn:active {
            background: #0d5489;
        }
        
        .error-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .error-item {
            background: #2a2d2e;
            border-left: 3px solid #f44336;
            margin-bottom: 12px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .error-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
        }
        
        .error-timestamp {
            font-size: 11px;
            color: #858585;
        }
        
        .error-copy-btn {
            padding: 4px 8px;
            background: #3e3e42;
            color: #cccccc;
            border: none;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .error-copy-btn:hover {
            background: #505050;
        }
        
        .error-message {
            padding: 12px 16px;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #f44336;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .no-errors {
            text-align: center;
            padding: 60px 20px;
            color: #858585;
        }
        
        .no-errors svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="error-header">
        <h1>⚠️ Sync Errors</h1>
        <div class="error-actions">
            <button id="copy-all-btn" class="btn" style="display: none;">📋 Copy All Errors</button>
            <button id="clear-btn" class="btn">🗑️ Clear Errors</button>
        </div>
    </div>
    <div id="error-list" class="error-list">
        <!-- Error items will be loaded here -->
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        
        let errors = [];
        
        // Request error log
        ipcRenderer.send('load-error-log');
        
        // Receive error log
        ipcRenderer.on('error-log-loaded', (event, errorData) => {
            renderErrors(errorData);
        });
        
        function renderErrors(errorData) {
            const errorList = document.getElementById('error-list');
            const copyAllBtn = document.getElementById('copy-all-btn');
            
            if (!errorData || !errorData.errors || errorData.errors.length === 0) {
                errorList.innerHTML = `
                    <div class="no-errors">
                        <svg viewBox="0 0 16 16" fill="currentColor">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
                        </svg>
                        <p>No errors found in last sync.</p>
                    </div>
                `;
                copyAllBtn.style.display = 'none';
                return;
            }
            
            errors = errorData.errors;
            copyAllBtn.style.display = 'inline-block';
            
            errorList.innerHTML = '';
            
            // Show newest errors first
            errors.forEach((error, index) => {
                const errorItem = createErrorItem(error, index);
                errorList.appendChild(errorItem);
            });
        }
        
        function createErrorItem(error, index) {
            const div = document.createElement('div');
            div.className = 'error-item';
            
            const timestamp = new Date(error.timestamp).toLocaleString();
            
            div.innerHTML = `
                <div class="error-item-header">
                    <span class="error-timestamp">${timestamp} - ${error.repo || 'Unknown repo'}</span>
                    <button class="error-copy-btn" data-index="${index}">📋 Copy</button>
                </div>
                <div class="error-message">${escapeHtml(error.message)}</div>
            `;
            
            // Add copy handler
            div.querySelector('.error-copy-btn').addEventListener('click', () => {
                copyToClipboard(error.message);
            });
            
            return div;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyToClipboard(text) {
            const { clipboard } = require('electron');
            clipboard.writeText(text);
            showNotification('Copied to clipboard!');
        }
        
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                background: #0dbc79;
                color: white;
                border-radius: 4px;
                z-index: 10000;
                font-size: 13px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
        
        // Copy all errors button
        document.getElementById('copy-all-btn').addEventListener('click', () => {
            if (errors.length === 0) return;
            
            const allErrors = errors.map(e => {
                const timestamp = new Date(e.timestamp).toLocaleString();
                return `[${timestamp}] ${e.repo || 'Unknown'}:\n${e.message}`;
            }).join('\n\n');
            
            copyToClipboard(allErrors);
        });
        
        // Clear errors button
        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('Clear all errors?')) {
                ipcRenderer.send('clear-errors');
                renderErrors({ errors: [] });
            }
        });
    </script>
</body>
</html>
